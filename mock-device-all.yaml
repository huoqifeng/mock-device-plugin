apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-device-config-all
  namespace: kube-system
data:
  device-config.yaml: |
    nvidia:
      resourceCountName: nvidia.com/gpu
      resourceMemoryName: nvidia.com/gpumem
      resourceMemoryPercentageName: nvidia.com/gpumem-percentage
      resourceCoreName: nvidia.com/gpucores
      defaultMemory: 8192
      defaultCores: 30
      defaultGPUNum: 4
      memoryFactor: 1
      mockModeSkipHealthCheck: true
      dynamicConfigFile: /etc/mock-device/dynamic-config.json
    
    hygon:
      resourceCountName: hygon.com/dcu
      resourceMemoryName: hygon.com/dcumem
      defaultDeviceNum: 2
      defaultMemory: 16384
      mockModeSkipHealthCheck: true
    
    amd:
      resourceCountName: amd.com/gpu
      resourceMemoryName: amd.com/gpumem
      mockModeSkipHealthCheck: true
      defaultDeviceNum: 2
      defaultMemory: 192000
    
    ascend:
      - commonWord: Ascend910
        chipName: Ascend910
        resourceName: huawei.com/Ascend910
        resourceMemoryName: huawei.com/Ascend910-memory
        memoryAllocatable: 32768
        memoryCapacity: 32768
        memoryFactor: 1
        aiCore: 56
        mockModeSkipHealthCheck: true
        defaultDeviceNum: 4
        defaultMemory: 32768
    
    awsneuron:
      resourceCountName: aws.amazon.com/neuron
      resourceCoreName: aws.amazon.com/neuroncore
      mockModeSkipHealthCheck: true
      defaultDeviceNum: 4
    
    cambricon:
      resourceCountName: cambricon.com/mlu
      resourceMemoryName: cambricon.com/mlumem
      resourceCoreName: cambricon.com/mlucore
      mockModeSkipHealthCheck: true
      defaultDeviceNum: 2
      defaultMemory: 16384
    
    enflame:
      resourceNameGCU: enflame.com/gcu
      resourceNameVGCU: enflame.com/vgcu
      resourceNameVGCUPercentage: enflame.com/vgcu-percentage
      mockModeSkipHealthCheck: true
      defaultDeviceNum: 2
    
    iluvatar:
      commonWord: Iluvatar
      chipName: Iluvatar
      resourceCountName: iluvatar.com/gpu
      resourceMemoryName: iluvatar.com/gpumem
      resourceCoreName: iluvatar.com/gpucores
      mockModeSkipHealthCheck: true
      defaultDeviceNum: 2
      defaultMemory: 16384
    
    kunlun:
      resourceCountName: kunlun.com/xpu
      resourceVCountName: kunlun.com/vxpu
      resourceVMemoryName: kunlun.com/vxpumem
      mockModeSkipHealthCheck: true
      defaultDeviceNum: 2
      defaultMemory: 16384
    
    metax:
      resourceCountName: metax.com/gpu
      resourceVCountName: metax.com/sgpu
      resourceVMemoryName: metax.com/sgpumem
      resourceVCoreName: metax.com/sgpucore
      sgpuTopologyAware: false
      mockModeSkipHealthCheck: true
      defaultDeviceNum: 2
      defaultMemory: 16384
    
    mthreads:
      resourceCountName: mthreads.com/gpu
      resourceMemoryName: mthreads.com/gpumem
      resourceCoreName: mthreads.com/gpucores
      mockModeSkipHealthCheck: true
      defaultDeviceNum: 2
      defaultMemory: 16384
  
  dynamic-config.json: |
    {
      "deviceCount": 4,
      "memoryPerDevice": 8192,
      "coresPerDevice": 30,
      "autoAdjust": true,
      "minDevices": 2,
      "maxDevices": 8,
      "adjustmentInterval": 60
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mock-device-plugin
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: mock-device-plugin
  template:
    metadata:
      labels:
        name: mock-device-plugin
    spec:
      serviceAccountName: mock-device-plugin
      nodeSelector:
        hardware-profile: accelerator-only
      hostNetwork: true
      containers:
      - name: mock-plugin
        image: mock-device-plugin:latest
        imagePullPolicy: Never
        env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
        command:
          - ./device-plugin
          - -v=5
          - --device-config-file=/etc/mock-device/device-config.yaml
        securityContext:
          privileged: true
        volumeMounts:
        - name: device-plugin-socket
          mountPath: /var/lib/kubelet/device-plugins
        - name: sys
          mountPath: /sys
        - name: device-config
          mountPath: /etc/mock-device
      volumes:
      - name: device-plugin-socket
        hostPath:
          path: /var/lib/kubelet/device-plugins
      - name: sys
        hostPath:
          path: /sys
      - name: device-config
        configMap:
          name: mock-device-config-all
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mock-device-plugin
rules:
- apiGroups: [""]
  resources: ["nodes", "pods"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["nodes/status"]
  verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mock-device-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mock-device-plugin
subjects:
- kind: ServiceAccount
  name: mock-device-plugin
  namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mock-device-plugin
  namespace: kube-system